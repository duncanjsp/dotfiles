console_title_template = '{{ .Shell }} in {{ .Folder }}'
version = 4
final_space = true

[palette]
  black = '#262B44'
  blue = '#4B95E9'
  green = '#59C9A5'
  orange = '#F07623'
  red = '#D81E5B'
  white = '#E0DEF4'
  yellow = '#F3AE35'

[secondary_prompt]
  template = '<p:yellow,transparent>ŅéČ</><,p:yellow> > </><p:yellow,transparent>Ņé░</> '
  foreground = 'p:black'
  background = 'transparent'

[transient_prompt]
  template = '<p:yellow,transparent>ŅéČ</><,p:yellow> {{ .PWD }} </><p:yellow,transparent>Ņé░</> '
  foreground = 'p:black'
  background = 'transparent'

[upgrade]
  source = 'cdn'
  interval = '168h'
  auto = false
  notice = false

[[blocks]]
  type = 'prompt'
  alignment = 'left'

  [[blocks.segments]]
    leading_diamond = 'ŅéČ'
    trailing_diamond = 'Ņé░'
    template = '{{ if .SSHSession }}Ņ«® {{ else }}Ņ£æ {{ end }}{{ .UserName }}{{ if .SSHSession }}@{{ .HostName }}{{ end }} '
    foreground = 'p:black'
    background = 'p:yellow'
    type = 'session'
    style = 'diamond'

  [[blocks.segments]]
    template = ' {{ path .Path .Location }} '
    foreground = 'p:white'
    powerline_symbol = 'Ņé░'
    background = 'p:orange'
    type = 'path'
    style = 'powerline'

  [[blocks.segments]]
    template = ' jj {{ if .ClosestBookmarks }}{{ .ClosestBookmarks }} {{ end }}{{ .ChangeID }}{{ if .Working.Changed }} ’üä {{ .Working.String }}{{ end }} '
    foreground = 'p:black'
    powerline_symbol = 'Ņé░'
    background = 'p:green'
    type = 'jujutsu'
    style = 'powerline'
    background_templates = ['{{ if .Working.Changed }}p:yellow{{ end }}']

    [blocks.segments.options]
      fetch_status = true
      ignore_working_copy = false
      fetch_ahead_counter = true
      ahead_icon = 'ŌćĪ'

  [[blocks.segments]]
    template = ' {{ if .UpstreamURL }}{{ url .UpstreamIcon .UpstreamURL }} {{ end }}{{ .HEAD }}{{if .BranchStatus }} {{ .BranchStatus }}{{ end }}{{ if .Working.Changed }} ’üä {{ .Working.String }}{{ end }}{{ if .Staging.Changed }} ’üå {{ .Staging.String }}{{ end }} '
    foreground = 'p:black'
    powerline_symbol = 'Ņé░'
    background = 'p:green'
    type = 'git'
    style = 'powerline'
    foreground_templates = ['{{ if or (.Working.Changed) (.Staging.Changed) }}p:black{{ end }}', '{{ if and (gt .Ahead 0) (gt .Behind 0) }}p:white{{ end }}', '{{ if gt .Ahead 0 }}p:white{{ end }}']
    background_templates = ['{{ if or (.Working.Changed) (.Staging.Changed) }}p:yellow{{ end }}', '{{ if and (gt .Ahead 0) (gt .Behind 0) }}p:red{{ end }}', '{{ if gt .Ahead 0 }}#49416D{{ end }}', '{{ if gt .Behind 0 }}#7A306C{{ end }}']

    [blocks.segments.options]
      disable_with_jj = true

  [[blocks.segments]]
    template = ' ’ā¦ '
    foreground = 'p:white'
    powerline_symbol = 'Ņé░'
    background = 'p:yellow'
    type = 'root'
    style = 'powerline'

  [[blocks.segments]]
    leading_diamond = '<transparent,background>Ņé░</>'
    trailing_diamond = 'Ņé┤'
    template = ' {{ if gt .Code 0 }}’ĆŹ{{ else }}’Ćī{{ end }} '
    foreground = 'p:white'
    background = 'p:blue'
    type = 'status'
    style = 'diamond'
    background_templates = ['{{ if gt .Code 0 }}p:red{{ end }}']

[[blocks]]
  type = 'rprompt'

  [[blocks.segments]]
    template = 'Ņ£ś {{ .Full }} '
    foreground = 'p:green'
    background = 'transparent'
    type = 'node'
    style = 'plain'

  [[blocks.segments]]
    template = 'Ņś¦ '
    foreground = 'p:blue'
    background = 'transparent'
    type = 'go'
    style = 'plain'

  [[blocks.segments]]
    template = 'Ņ×æ {{ .Full }} '
    foreground = 'p:yellow'
    background = 'transparent'
    type = 'ruby'
    style = 'plain'

  [[blocks.segments]]
    template = 'ŅłĄ '
    foreground = 'p:yellow'
    background = 'transparent'
    type = 'python'
    style = 'plain'

  [[blocks.segments]]
    template = 'in <p:blue><b>{{ .Name }}</b></> '
    foreground = 'p:white'
    background = 'transparent'
    type = 'shell'
    style = 'plain'

  [[blocks.segments]]
    template = '¾▒äģ '
    foreground = 'p:blue'
    background = 'transparent'
    type = 'nix-shell'
    style = 'powerline'

  [[blocks.segments]]
    template = 'at <p:blue><b>{{ .CurrentDate | date "15:04:05" }}</b></>'
    foreground = 'p:white'
    background = 'transparent'
    type = 'time'
    style = 'plain'

[[blocks]]
  type = 'prompt'
  alignment = 'left'
  newline = true

  [[blocks.segments]]
    template = '’æĀ’æĀ’æĀ'
    foreground = 'p:white'
    background = 'transparent'
    type = 'text'
    style = 'plain'

[[tooltips]]
  leading_diamond = 'Ņé░'
  trailing_diamond = 'Ņé┤'
  template = ' Ņ×Ł {{ .Profile }}{{ if .Region }}@{{ .Region }}{{ end }} '
  foreground = 'p:white'
  background = 'p:orange'
  type = 'aws'
  style = 'diamond'
  tips = ['aws']

[[tooltips]]
  leading_diamond = 'Ņé░'
  trailing_diamond = 'Ņé┤'
  template = ' Ņ»ś {{ .Name }} '
  foreground = 'p:white'
  background = 'p:blue'
  type = 'az'
  style = 'diamond'
  tips = ['az']
